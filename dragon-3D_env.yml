name: dragon-3D
channels:
  - nvidia
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pytorch=2.4.0
  - torchvision=0.19.0
  - torchaudio=2.4.0
  - pytorch-cuda=11.8
  - rdkit
  - openbabel=3.1.1
  - biopython  
  - numpy
  - scipy
  - pandas
  - scikit-learn
  - plip
  - cctbx-base
  - scikit-image
  - pip
  - pip:
      - -f https://data.pyg.org/whl/torch-2.4.0+cu118.html
      - torch-scatter==2.1.2+pt24cu118
      - torch-sparse==0.6.18+pt24cu118
      - torch-cluster==1.6.3+pt24cu118
      - torch-spline-conv==1.2.2+pt24cu118
      - torch-geometric==2.3.0
      - tensorboard
      - tqdm
      - pyvista
      
